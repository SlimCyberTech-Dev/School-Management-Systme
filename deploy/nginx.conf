# Reference Nginx config for Uganda CBC SMS API (Express on localhost:5000)
# Adjust server_name, SSL paths, and upstream for your deployment.

limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;
limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/m;

upstream school_api {
    server 127.0.0.1:5000;
    keepalive 32;
}

server {
    listen 80;
    server_name api.example.school.ug;

    client_max_body_size 2M;
    client_body_timeout 15s;
    client_header_timeout 15s;
    send_timeout 30s;
    proxy_read_timeout 60s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;

    # Block common scanners and empty user agents
    if ($http_user_agent = "") {
        return 403;
    }
    if ($request_method !~ ^(GET|POST|PATCH|DELETE|OPTIONS|HEAD)$) {
        return 405;
    }

    limit_conn conn_per_ip 20;

    location /api/auth/login {
        limit_req zone=api_auth burst=5 nodelay;
        proxy_pass http://school_api;
        include proxy_params.conf;
    }

    location /api/ {
        limit_req zone=api_general burst=60 nodelay;
        proxy_pass http://school_api;
        include proxy_params.conf;
    }

    location /uploads/ {
        limit_req zone=api_general burst=30 nodelay;
        proxy_pass http://school_api;
        include proxy_params.conf;
    }

    location / {
        return 404;
    }
}

